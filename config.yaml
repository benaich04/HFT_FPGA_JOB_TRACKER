    - ios
    - android
    - devops
    - site reliability
    - cloud engineer
    - security engineer
    - cyber

  # Role terms — an internship-only tracker: jobs earn role points only here.
  role_intern_terms:
    - intern
    - internship
    - summer intern
    - summer internship
    - spring intern
    - fall intern
    - winter intern
    - off-cycle intern
    - research intern
    - placement
    - industrial placement
    - year in industry
    - university program
    - university programme
    - campus
    - student

  role_coop_terms:
    - co-op
    - coop
    - co op

  role_graduate_terms:            # gated by settings.include_graduate_programs
    - graduate program
    - graduate programme
    - graduate engineer
    - graduate hardware
    - graduate fpga
    - new grad
    - new graduate
    - early careers
    - early career
    - entry level

  # Seniority — heavy penalty in title (-60): structurally excludes experienced roles.
  seniority_exclude:
