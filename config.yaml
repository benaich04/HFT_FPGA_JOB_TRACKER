    - buyer
    - purchasing
    - sourcing
    - supply chain
    - hr
    - human resources
    - recruiter
    - recruiting
    - recruitment
    - talent acquisition
    - people operations
    - finance
    - accounting
    - accountant
    - payroll
    - tax
    - audit
    - treasury
    - marketing
    - sales
    - business development
    - legal
    - counsel
    - paralegal
    - compliance
    - regulatory
    - business analyst
    - business operations
    - operations
    - office
    - workplace
    - facilities
    - real estate
    - it support
    - help desk
    - helpdesk
    - desktop support
    - service desk
    - customer support
    - customer success
    - customer service
    - administrative
    - executive assistant
    - receptionist
    - investor relations
    - communications
    - events
    - data center technician

  # SOFT EXCLUDE — adjacent-but-wrong roles. Rejected UNLESS a core technical
  # term appears in the title ('FPGA Software Engineer Intern' survives;
