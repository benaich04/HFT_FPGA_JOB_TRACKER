# Reference copy — the live workflow is .github/workflows/update_jobs.yml
# (kept here so the workflow is visible even if you browse the repo root)

# ============================================================================
# HFT FPGA Job Tracker — scheduled workflow (V2)
# Runs every 12 hours, on manual dispatch, and on pushes that change the
# scraper or config (which also runs the test suite as a gate).
#
# One-time repo setting required:
#   Settings → Actions → General → Workflow permissions
#   → "Read and write permissions"
# ============================================================================

name: Update FPGA Job Tracker

on:
  schedule:
    - cron: "0 */12 * * *"        # 00:00 and 12:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "config.yaml"
      - "scraper/**"
      - "tests/**"
      - ".github/workflows/update_jobs.yml"

permissions:
  contents: write                  # commit README.md + data/
  issues: write                    # only used by the optional GitHub Issue notifier

concurrency:
  group: fpga-job-tracker
  cancel-in-progress: false

jobs:
  update-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium for Playwright
        # If this ever fails, the tracker degrades gracefully: JS-only sites
        # are reported as PLAYWRIGHT_UNAVAILABLE instead of crashing the run.
        run: playwright install --with-deps chromium
        continue-on-error: true

      - name: Run test suite (push events only)
        if: github.event_name == 'push'
        run: python tests/run_all.py

      - name: Run scraper
        env:
          # Optional notification secrets — set the ones you use under
          # Settings → Secrets and variables → Actions.
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scraper/main.py

      - name: Commit and push updates
        run: |
          git config user.name "fpga-job-tracker-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update job listings ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
