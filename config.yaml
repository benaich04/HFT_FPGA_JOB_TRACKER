# ============================================================================
# HFT FPGA Job Tracker — Configuration (V2)
# ============================================================================
# V2 philosophy: config provides HINTS, not truth. `ats`/`token` are optional
# hints; when they fail (INVALID_TOKEN) the tracker auto-discovers the real
# board from the careers page and persists it to data/discovered_ats.json.
# You should never need to hand-maintain tokens again.
# ============================================================================

settings:
  request_delay_seconds: 2.0        # politeness between requests (env: TRACKER_REQUEST_DELAY)
  request_timeout_seconds: 25
  respect_robots_txt: true          # never bypassed; blocked firms are listed in README
  user_agent: "Mozilla/5.0 (compatible; HFT-FPGA-Job-Tracker/2.0; +https://github.com/benaich04/HFT_FPGA_JOB_TRACKER)"
  fetch_descriptions: true
  max_description_length: 300

  # --- Relevance ---
  min_confidence: 70                # jobs below this score are rejected (0-99)
  include_graduate_programs: true   # 'Graduate FPGA Engineer' etc. (set false for interns/co-ops only)
  include_remote: true              # keep 'Remote' roles with no specific country
  allow_unknown_location: true      # keep link-scraped jobs with no visible location (flagged, -10 score)

  # --- JS rendering ---
  enable_playwright: true
  playwright_timeout_seconds: 35

  # --- Self-healing discovery ---
  discovery:
    allow_token_guessing: true      # verify a few name-derived tokens against public ATS APIs
    max_guesses: 4

  # --- Job lifecycle ---
  stale_after_days: 45              # close unseen jobs after 45d when source was unhealthy
  api_missing_runs_to_close: 2      # close after 2 consecutive healthy-API misses (ATS says gone)

  # --- Notifications (all optional, off by default; secrets via env vars) ---
  notifications:
    enabled: false
    min_confidence: 80              # only notify for jobs at/above this score
    channels:
      discord:
        enabled: false
        webhook_env: DISCORD_WEBHOOK_URL
      slack:
        enabled: false
        webhook_env: SLACK_WEBHOOK_URL
      email:
        enabled: false
        smtp_host: smtp.gmail.com
        smtp_port: 587
        username_env: SMTP_USERNAME
        password_env: SMTP_PASSWORD
        from_address: ""            # defaults to username
        to_address: ""
      github_issue:
        enabled: false              # opens an issue in this repo (needs issues: write)

