    - systemverilog
    - system verilog
    - vhdl
    - dsp
    - digital signal processing
    - signal processing
    - asic
    - digital design
    - logic design
    - computer architecture
    - hardware design
    - hardware verification
    - hardware engineering
    - hardware engineer
    - digital hardware
    - microarchitecture
    - electrical engineering
    - electrical engineer
    - silicon
    - chip design
    - uvm

  # Secondary technical terms — supporting evidence (+6 each, capped).
  technical_secondary:
    - pcie
    - pci express
    - ethernet
    - networking hardware
    - network hardware
    - vivado
    - quartus
    - rfsoc
    - ultrascale
    - versal
    - xilinx
    - altera
    - intel fpga
    - amd fpga
    - axi
    - dma
    - adc
    - dac
    - fft
    - fir
    - iir
    - cordic
    - MAC            # matched case-sensitively to avoid Apple-Mac false hits
    - serdes
    - hls
    - high level synthesis
    - chisel
    - bluespec
    - hdl
    - soc
    - timing closure
    - static timing analysis
    - latency optimization
    - low latency
    - ultra-low latency
    - tick-to-trade
    - market data
    - kernel bypass
    - solarflare
    - exablaze
    - 10g
